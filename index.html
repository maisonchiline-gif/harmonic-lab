<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harmonic Lab | CHILINE</title>
    <style>
        :root {
            --bg: #f9f9fb; --line: #1c1c1e; --text: #000000; --dim: #8e8e93;
            --brand: #007aff; --ozon: #005bff; --boosty: #f15f2c;
            --font-stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --rot-color: 0deg;
        }
        body {
            margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-stack);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; overflow-x: hidden; user-select: none; -webkit-user-select: none;
        }

        .header { width: 100%; display: flex; justify-content: center; padding: 4vh 0; z-index: 40; }

        .top-controls { display: flex; gap: 10px; align-items: center; }

        .mode-toggle { display: flex; background: #e5e5ea; border-radius: 12px; padding: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .mode-toggle button {
            background: transparent; border: none; padding: 8px 24px;
            border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--dim);
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .mode-toggle button.active { background: #ffffff; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.12); }

        .btn-info-top {
            width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            background: #e5e5ea; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .btn-info-top:active { transform: scale(0.95); }
        .icon-info { font-style: italic; font-weight: 700; font-size: 18px; font-family: serif; color: var(--dim); }

        .workspace { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; flex-grow: 1; min-height: 400px; }

        .tap-zones { position: absolute; width: 100%; height: 100%; display: flex; z-index: 5; }
        .tap-zone { flex: 1; cursor: pointer; }

        .stage-wrapper {
            position: relative; width: 380px; height: 380px; background: #ffffff; border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06), 0 2px 10px rgba(0,0,0,0.02);
            display: flex; align-items: center; justify-content: center; z-index: 10; pointer-events: none;
        }

        .arrow-icon {
            position: absolute; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; fill: none;
            stroke: var(--text); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; transition: 0.15s ease;
            opacity: 0.5; pointer-events: none; z-index: 20;
        }
        .arrow-left { left: -32px; } .arrow-right { right: -32px; }

        .stage { position: absolute; width: 340px; height: 340px; display: flex; align-items: center; justify-content: center; }
        svg { position: absolute; will-change: transform; transition: transform 0.6s cubic-bezier(0.25, 1, 0.35, 1); }
        #svg-color { z-index: 1; transform: rotate(var(--rot-color)); }
        #svg-grid { z-index: 2; } #svg-text { z-index: 3; }

        .major { font-size: 6.5px; font-weight: 700; fill: #000000; text-anchor: middle; dominant-baseline: central; letter-spacing: -0.2px; }
        .minor { font-size: 4.8px; font-weight: 600; fill: #000000; text-anchor: middle; dominant-baseline: central; }
        .center-brand { font-size: 4px; font-weight: 800; fill: var(--line); text-anchor: middle; dominant-baseline: central; letter-spacing: 0.5px; opacity: 0.8; }
        
        .monetization-hub { width: 100%; max-width: 450px; padding: 0 20px 4vh; margin-top: 20px; z-index: 40; display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; }
        
        .ui-panel {
            width: 100%; height: 44px; background: #ffffff; border-radius: 12px; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center;
    
            margin-top: 15px;    /* Расстояние до легенды сверху */
            margin-bottom: 15px; /* Расстояние до кнопок Telegram/Boosty снизу */
        }
        select {
            width: 100%; height: 100%; appearance: none; -webkit-appearance: none; background: transparent; border: none;
            font-family: var(--font-stack); font-size: 13px; font-weight: 600; color: var(--text);
            padding: 0 30px 0 16px; cursor: pointer; outline: none;
        }
        .ui-panel::after { content: "▼"; font-size: 9px; color: var(--dim); position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }

        /* Стили легенды */
        .legend-container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 4px 2px; margin-bottom: 4px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 650; color: var(--text); }
        .legend-dot { width: 15px; height: 15px; border-radius: 3px; flex-shrink: 0; }

        .social-row { display: flex; gap: 10px; width: 100%; height: 44px; }
        
        .btn-social {
            flex: 1;
            border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 6px;
            background: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05);
            text-decoration: none; transition: 0.2s; color: var(--line); font-size: 14px; font-weight: 700;
        }
        .btn-social:active { transform: scale(0.97); }
        .social-row .btn-social:first-child {
            background: #0088cc; color: #ffffff; border: 1px solid #0088cc; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }
        .social-row .btn-social:last-child {
            background: #f15f2c; color: #ffffff; border: 1px solid #f15f2c; box-shadow: 0 4px 15px rgba(241, 95, 44, 0.3);
        }

        .ozon-banner {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #ffffff; color: #ffffff; text-decoration: none;
            padding: 16px; border-radius: 16px; text-align: center;
            box-shadow: 0 4px 15px rgba(216, 216, 216, 0.513);
            margin-top: 4px;
        }
        .ozon-banner:active { transform: scale(0.97); }
        .ozon-banner .ozon-title { color: #212020; }
        .ozon-title { font-size: 15px; font-weight: 800; margin-bottom: 6px; letter-spacing: 0.2px; }
        .ozon-ozon { color: #005bff; }
        .ozon-subtitle { font-size: 12px; font-weight: 600; line-height: 1.5; }
    
        .products-grid { display: flex; flex-direction: column; gap: 14px; width: 100%; margin-top: 10px; }
        .product-card {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            background: #ffffff; padding: 16px; border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05);
            text-decoration: none; transition: 0.2s; cursor: pointer;
        }
        .product-card:active { transform: scale(0.98); }
        .product-image { 
            width: 100%; height: auto; aspect-ratio: 1 / 1; 
            background: #f0f0ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            flex-shrink: 0; overflow: hidden; 
        }
        .product-info { width: 100%; text-align: left; display: flex; flex-direction: column; justify-content: center; }
        .product-name { font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
        .product-desc { font-size: 13px; color: var(--dim); line-height: 1.4; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 100;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-content {
            background: #ffffff; width: 85%; max-width: 340px; border-radius: 20px;
            padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.25, 1, 0.35, 1);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .modal-title { font-size: 16px; font-weight: 800; margin: 0; color: var(--text); }
        .modal-close { 
            background: #f2f2f7; border: none; width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
            font-weight: bold; color: var(--dim); cursor: pointer;
        }
        .modal-text { font-size: 13px; line-height: 1.6; color: #333333; margin: 0; font-weight: 500; }
        .modal-list { margin: 8px 0 0 0; padding-left: 20px; font-size: 13px; line-height: 1.6; font-weight: 500; color: #333; }
        .modal-list li { margin-bottom: 4px; }
    </style>
</head>
<body>

<script>
    const svgGrid = document.getElementById('svg-grid'), svgText = document.getElementById('svg-text'), svgColor = document.getElementById('svg-color');
    const root = document.documentElement;
    
    const majors = ['C', 'G', 'D', 'A', 'E', 'H', 'G♭', 'D♭', 'A♭', 'E♭', 'B', 'F'];
    const minors = ['A', 'E', 'H', 'F♯', 'C♯', 'G♯', 'D#', 'B', 'F', 'C', 'G', 'D'];
    
    const c0 = '#A2E0B2'; const c1 = '#34C759'; const c2 = '#FFCC00'; const c3 = '#FF9500'; const c4 = '#FF3B30'; const c5 = '#5AC8FA'; const c6 = '#FF2D78';
    
    const palettes = {
        rimsky: { 
            maj: { out: [c0, c1, c2, c2, c2, c2, c4, c2, c2, c2, c2, c1], in: [c1, c1, c2, c4, c4, c4, c4, c2, c1, c2, c2, c1] },
            min: { out: [c1, c1, c2, c2, c1, c2, c4, c4, c4, c4, c2, c1], in: [c0, c1, c2, c2, c2, c2, c4, c2, c2, c2, c2, c1] }
        },
        tylin: { 
            maj: { out: [c0, c1, c2, c2, c2, c2, c4, c2, c2, c2, c2, c1], in: [c1, c1, c2, c4, c4, c4, c4, c2, c1, c0, c2, c1] },
            min: { out: [c1, c1, c2, c0, c1, c2, c4, c4, c4, c4, c2, c1], in: [c0, c1, c2, c2, c2, c2, c4, c2, c2, c2, c2, c1] }
        },
        shilin: { 
            maj: { out: [c0, c1, c2, c2, c1, c2, c4, c2, c2, c2, c2, c1], in: [c0, c1, c2, c2, c2, c2, c4, c2, c1, c2, c2, c1] },
            min: { out: [c0, c1, c2, c2, c1, c2, c4, c2, c2, c2, c2, c1], in: [c0, c1, c2, c2, c2, c2, c4, c2, c1, c2, c2, c1] }
        },
        catoire: { 
            maj: { out: [c0, c1, c2, c4, c4, c4, c4, c4, c4, c4, c2, c1], in: [c1, c1, c2, c4, c4, c4, c4, c4, c4, c4, c2, c1] },
            min: { out: [c1, c1, c2, c4, c4, c4, c4, c4, c4, c4, c2, c1], in: [c0, c1, c2, c4, c4, c4, c4, c4, c4, c4, c2, c1] }
        },
        brigada: { 
            maj: { out: [c0, c1, c2, c3, c3, c3, c4, c3, c3, c3, c2, c1], in: [c1, c1, c2, c4, c4, c4, c4, c3, c1, c3, c2, c1] },
            min: { out: [c1, c1, c2, c3, c1, c3, c4, c4, c4, c4, c2, c1], in: [c0, c1, c2, c3, c3, c3, c4, c3, c3, c3, c2, c1] }
        },
        sposobin_I: { 
            maj: { out: [c0, c1, c4, c4, c4, c4, c4, c4, c2, c2, c2, c1], in: [c1, c1, c4, c4, c4, c4, c4, c4, c2, c2, c2, c1] },
            min: { out: [c1, c1, c2, c2, c2, c4, c4, c4, c4, c4, c4, c1], in: [c0, c1, c2, c2, c2, c4, c4, c4, c4, c4, c4, c1] }
        },
        sposobin_II: { 
            maj: { out: [c0, c1, c4, c4, c6, c4, c4, c5, c2, c2, c2, c1], in: [c1, c1, c4, c4, c4, c4, c4, c4, c3, c2, c2, c1] },
            min: { out: [c1, c1, c2, c2, c3, c4, c4, c4, c4, c4, c5, c1], in: [c0, c1, c2, c2, c2, c4, c4, c4, c6, c4, c4, c1] }
        }
    };

    const systemInfo = {
        rimsky: { title: "Римский-Корсаков", desc: "Диатоническое сродство аккордов.", legend: [{c: c0, t: "0 степень"}, {c: c1, t: "I ст."}, {c: c2, t: "II ст."}, {c: c4, t: "III ст."}], list: ["I ст. — 1 знак разницы", "II ст. — 2 знака", "III ст. — дальние"] },
        tylin: { title: "Тюлин", desc: "Функциональная концепция Тюлина.", legend: [{c: c0, t: "0 степень"}, {c: c1, t: "I ст."}, {c: c2, t: "II ст."}, {c: c4, t: "III ст."}], list: ["Пункт 1", "Пункт 2"] },
        shilin: { title: "Шилин", desc: "Авторская классификация Шилина.", legend: [{c: c0, t: "0 степень"}, {c: c1, t: "I ст."}, {c: c2, t: "II ст."}, {c: c4, t: "III ст."}], list: ["Критерий 1", "Критерий 2"] },
        catoire: { title: "Катуар", desc: "Функциональная теория Римана-Катуара.", legend: [{c: c0, t: "0 степень"}, {c: c1, t: "I ст."}, {c: c2, t: "II ст."}, {c: c4, t: "III ст."}], list: ["Учет мажоро-минора", "Многозначность"] },
        brigada: { title: "Бригада", desc: "Московская школа.", legend: [{c: c0, t: "0 степень"}, {c: c1, t: "I ст."}, {c: c2, t: "II ст."}, {c: c3, t: "III ст."}, {c: c4, t: "IV ст."}], list: ["I ст. — 6 аккордов", "II ст. — 4 аккорда", "III ст. — остальные"] },
        sposobin_I: { title: "Способин I", desc: "Система I по Способину.", legend: [{c: c0, t: "0 степень"}, {c: c1, t: "I ст."}, {c: c2, t: "II ст."}, {c: c4, t: "III ст."}], list: ["Пункт 1", "Пункт 2"] },
        sposobin_II: { title: "Способин II", desc: "Хроматическое родство.", legend: [{c: c0, t: "0 степень"}, {c: c1, t: "I ст."}, {c: c3, t: "II ст."}, {c: c2, t: "III ст."}, {c: c4, t: "IV ст."}, {c: c5, t: "V ст."}, {c: c6, t: "VI ст."}], list: ["Уровень 1", "Уровень 2"] }
    };

    let colorAngle = 0; let currentMode = 'maj'; let currentSystem = 'rimsky';
    let domPathsMaj = [], domPathsMin = [];

    function initSvg() {
        const ringWidth = 0.25; let gridHtml = '', textHtml = '', colorHtml = '';
        [48, 28, 14].forEach(r => gridHtml += `<circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--line)" stroke-width="${ringWidth}"/>`);
        for (let i = 0; i < 12; i++) {
            const angleDeg = i * 30 - 90, textAngle = angleDeg * (Math.PI / 180), lineAngle = (angleDeg - 15) * (Math.PI / 180), start = (i * 30 - 105) * (Math.PI / 180), end = (i * 30 - 75) * (Math.PI / 180);
            gridHtml += `<line x1="${50 + 14 * Math.cos(lineAngle)}" y1="${50 + 14 * Math.sin(lineAngle)}" x2="${50 + 48 * Math.cos(lineAngle)}" y2="${50 + 48 * Math.sin(lineAngle)}" stroke="var(--line)" stroke-width="${ringWidth}"/>`;
            const mx = 50 + 38 * Math.cos(textAngle), my = 50 + 38 * Math.sin(textAngle), mix = 50 + 21 * Math.cos(textAngle), miy = 50 + 21 * Math.sin(textAngle);
            textHtml += `<text x="${mx}" y="${my}" class="major">${majors[i]}</text><text x="${mix}" y="${miy + 1}" class="minor">${minors[i]}</text>`;
            const pathM = (r1, r2) => `M ${50 + r1 * Math.cos(start)} ${50 + r1 * Math.sin(start)} L ${50 + r2 * Math.cos(start)} ${50 + r2 * Math.sin(start)} A ${r2} ${r2} 0 0 1 ${50 + r2 * Math.cos(end)} ${50 + r2 * Math.sin(end)} L ${50 + r1 * Math.cos(end)} ${50 + r1 * Math.sin(end)} A ${r1} ${r1} 0 0 0 ${50 + r1 * Math.cos(start)} ${50 + r1 * Math.sin(start)} Z`;
            colorHtml += `<path class="c-maj" d="${pathM(28, 48)}" fill-opacity="0.8"/>`;
            colorHtml += `<path class="c-min" d="${pathM(14, 28)}" fill-opacity="0.8"/>`;
        }
        textHtml += `<text x="50" y="50" class="center-brand">CHILINE</text>`;
        svgGrid.innerHTML = gridHtml; svgText.innerHTML = textHtml; svgColor.innerHTML = colorHtml;
        domPathsMaj = Array.from(svgColor.querySelectorAll('.c-maj')); domPathsMin = Array.from(svgColor.querySelectorAll('.c-min'));
        applyColors();
    }

    function applyColors() {
        const palette = palettes[currentSystem][currentMode];
        domPathsMaj.forEach((path, i) => path.setAttribute('fill', palette.out[i]));
        domPathsMin.forEach((path, i) => path.setAttribute('fill', palette.in[i]));
    }

    function updateLegend() {
        const box = document.getElementById('legend-box');
        const data = systemInfo[currentSystem].legend;
        box.innerHTML = '';
        data.forEach(item => {
            box.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background: ${item.c}"></div><span>${item.t}</span></div>`;
        });
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-maj').classList.toggle('active', mode === 'maj');
        document.getElementById('btn-min').classList.toggle('active', mode === 'min');
        applyColors();
    }

    function changeSystem(sysName) { 
        currentSystem = sysName; 
        applyColors(); 
        updateLegend(); 
    }

    function openInfo() {
        const data = systemInfo[currentSystem];
        document.getElementById('modal-title').innerText = data.title;
        document.getElementById('modal-desc').innerText = data.desc;
        const listEl = document.getElementById('modal-list'); listEl.innerHTML = '';
        data.list.forEach(item => { const li = document.createElement('li'); li.innerText = item; listEl.appendChild(li); });
        const modal = document.getElementById('info-modal'); modal.style.display = 'flex';
        setTimeout(() => { modal.style.opacity = '1'; modal.querySelector('.modal-content').style.transform = 'scale(1)'; }, 10);
    }

    function closeInfo(e) {
        const modal = document.getElementById('info-modal');
        modal.style.opacity = '0'; modal.querySelector('.modal-content').style.transform = 'scale(0.95)';
        setTimeout(() => { modal.style.display = 'none'; }, 300);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSnap() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.type = 'triangle'; osc.frequency.setValueAtTime(350, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.04);
        g.gain.setValueAtTime(0.04, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.04);
        osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.04);
    }

    function rotateWheel(direction) {
        colorAngle += direction * 30; root.style.setProperty('--rot-color', `${colorAngle}deg`); playSnap();
        const arr = direction === -1 ? document.getElementById('arr-left') : document.getElementById('arr-right');
        arr.style.transform = 'translateY(-50%) scale(0.8)'; arr.style.opacity = '1';
        setTimeout(() => { arr.style.transform = 'translateY(-50%) scale(1)'; arr.style.opacity = '0.5'; }, 150);
    }

    document.getElementById('tap-zones').addEventListener('click', (e) => {
        const zone = e.target.closest('.tap-zone'); if (!zone) return;
        rotateWheel(parseInt(zone.dataset.dir));
    });

    document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (e.key === 'ArrowLeft' || key === 'a' || key === 'ф' || e.key === '4') rotateWheel(-1);
        else if (e.key === 'ArrowRight' || key === 'd' || key === 'в' || e.key === '6') rotateWheel(1);
    });

    initSvg();
    updateLegend();
</script>
</body>
</html>
